services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    shm_size: 1gb
    environment:
      POSTGRES_DB: postgres
      POSTGRES_PASSWORD: ${DEGOV_DB_PASSWORD}
    volumes:
      - ./.data/postgres:/var/lib/postgresql/data
      - ./init-scripts/postgres:/docker-entrypoint-initdb.d
    ports:
      - "${DEGOV_DB_PORT:-7453}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  indexer:
    image: degov-indexer
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    build:
      context: .
      dockerfile: docker/indexer.Dockerfile
    ports:
      - "${DEGOV_INDEXER_PORT:-4350}:4350"
    environment:
      DB_HOST: postgres
      DB_NAME: indexer
      DB_USER: postgres
      DB_PASS: ${DEGOV_DB_PASSWORD}
      DB_PORT: 5432
      GQL_PORT: 4350
      DEGOV_SYNC_ENDPOINT: http://web:3000/api/degov/sync
      DEGOV_SYNC_AUTH_TOKEN: ${DEGOV_SYNC_AUTH_TOKEN}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
      OPENROUTER_DEFAULT_MODEL: ${OPENROUTER_DEFAULT_MODEL}
      DEGOV_CONFIG_PATH: /app/degov.yml
      CHAIN_RPC_1: ${CHAIN_RPC_1}
      # CHAIN_RPC_10: ${CHAIN_RPC_10}
      # CHAIN_RPC_...: ${CHAIN_RPC_...}
    volumes:
      - ./degov.yml:/app/degov.yml:ro

  web:
    image: degov-web
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    build:
      context: .
      dockerfile: docker/web.Dockerfile
    ports:
      - "${DEGOV_WEB_PORT:-3002}:3000"
    environment:
      JWT_SECRET_KEY: ${DEGOV_WEB_JWT_SECRET}
      DATABASE_URL: postgresql://postgres:${DEGOV_DB_PASSWORD}@postgres/degov
      DEGOV_SYNC_AUTH_TOKEN: ${DEGOV_SYNC_AUTH_TOKEN}
      DEGOV_CONFIG_PATH: /app/degov.yml
    volumes:
      - ./degov.yml:/app/degov.yml:ro
