# DeGov Datalens indexer example configuration.
#
# Load this file with:
#   DEGOV_INDEXER_CONFIG_FILE=apps/indexer/indexer.example.yml
#
# Keep DATALENS_TOKEN in the environment or a secret manager. It is intentionally
# omitted here. Environment variables override values from this file.
#
# Set DEGOV_INDEXER_DAO_CODE to run one contract set. Leave it unset to run all
# configured contract sets when every contract has daoCode.
# Leave DEGOV_INDEXER_TARGET_HEIGHT unset or set it to latest for production
# durable-head tracking. Numeric target heights are for debug or bounded test runs.

datalens:
  endpoint: https://datalens.ringdao.com
  application: degov-live
  finality: durable_only
  dataset:
    family: evm
    name: logs
  queryLimits:
    blockRangeLimit: 1000
  warmup:
    enabled: true
    ensureOnStartup: true

rpc:
  chains:
    "1":
      urlEnv: ETHEREUM_RPC_URL
    "1135":
      urlEnv: LISK_RPC_URL
    "8453":
      urlEnv: BASE_RPC_URL
    "42161":
      urlEnv: ARBITRUM_RPC_URL

chains:
  - chainId: 1
    networkName: ethereum
    contracts:
      - daoCode: ens-dao
        governor: "0x323A76393544d5ecca80cd6ef2A560C6a395b7E3"
        governorToken: "0xC18360217D8F7Ab5e7c516566761Ea12Ce7F9D72"
        tokenStandard: ERC20
        timelock: "0xFe89cc7aBB2C4183683ab71653C4cdc9B02D44b7"
        startBlock: 13533418
  - chainId: 1135
    networkName: lisk
    contracts:
      - daoCode: lisk-dao
        governor: "0x58a61b1807a7bDA541855DaAEAEe89b1DDA48568"
        governorToken: "0x2eE6Eca46d2406454708a1C80356a6E63b57D404"
        tokenStandard: ERC20
        timelock: "0x2294A7f24187B84995A2A28112f82f07BE1BceAD"
        startBlock: 568752
  - chainId: 8453
    networkName: base
    contracts:
      - daoCode: internet-token-dao
        governor: "0xc5C3a1882Eff9539527D88E2453cAB10d9bc1581"
        governorToken: "0x968D6A288d7B024D5012c0B25d67A889E4E3eC19"
        tokenStandard: ERC20
        timelock: "0xE05dD5B785f578337B2B8F695Fbc521669c69403"
        startBlock: 12149008
  - chainId: 42161
    networkName: arbitrum
    contracts:
