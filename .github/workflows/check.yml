name: Check

on:
  pull_request:

jobs:
  check-workspace:
    name: Check Workspace
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup NodeJS
        uses: actions/setup-node@v5
        with:
          node-version: 22

      - uses: pnpm/action-setup@v4
        with:
          version: 10.32.1

      - name: Check build
        run: |
          pnpm install --frozen-lockfile
          pnpm --filter @degov/web build

  check-indexer:
    name: Check indexer
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup NodeJS
        uses: actions/setup-node@v5
        with:
          node-version: 22

      - uses: pnpm/action-setup@v4
        with:
          version: 10.32.1

      - name: Check build
        run: |
          pnpm install --frozen-lockfile
          pnpm --filter @degov/indexer build
          pnpm --filter @degov/indexer test

  check-config:
    name: Check Config
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Prepare schema
        run: |
          mkdir -p schemas
          cd schemas
          curl -LO https://raw.githubusercontent.com/ringecosystem/degov-registry/refs/heads/main/schemas/dao.schema.json

      - name: validate dao
        uses: GrantBirki/json-yaml-validate@v4
        with:
          json_schema: schemas/dao.schema.json
          yaml_as_json: true
          files: degov.yml
          comment: "true"
