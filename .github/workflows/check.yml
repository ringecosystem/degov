name: Check

on:
  pull_request:

jobs:
  check-workspace:
    name: Check Workspace
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v4
        with:
          version: 10.32.1

      - name: Setup NodeJS
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm

      - name: Check build
        run: |
          pnpm install --filter @degov/web... --frozen-lockfile
          pnpm run test:web-scripts
          pnpm --filter @degov/web build

  check-indexer:
    name: Check indexer
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: datalens_test
          POSTGRES_PASSWORD: datalens
          POSTGRES_USER: datalens
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U datalens -d datalens_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DEGOV_INDEXER_TEST_DATABASE_URL: postgresql://datalens:datalens@localhost:5432/datalens_test
    steps:
      - uses: actions/checkout@v5

      - name: Setup NodeJS
        uses: actions/setup-node@v5
        with:
          node-version: 22
          package-manager-cache: false

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Check build
        run: |
          cargo build --locked -p degov-datalens-indexer
          cd apps/indexer
          node ./scripts/check-rust-conventions.mjs
          cargo test --locked
          node ./scripts/check-rust-conventions.test.mjs
          node ./scripts/compatibility-preflight.test.mjs

  check-config:
    name: Check Config
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Prepare schema
        run: |
          mkdir -p schemas
          cd schemas
          curl -LO https://raw.githubusercontent.com/ringecosystem/degov-registry/refs/heads/main/schemas/dao.schema.json

      - name: validate dao
        uses: GrantBirki/json-yaml-validate@v4
        with:
          json_schema: schemas/dao.schema.json
          yaml_as_json: true
          files: degov.yml
          comment: "true"
