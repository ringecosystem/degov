name: IGRA Governance
code: igra-governance
logo: /igra-logo-avatar.png
siteUrl: https://governance.igralabs.com
offChainDiscussionUrl: https://discord.gg/igralabs
editLink: https://github.com/IgraLabs/degov/blob/igra/fix-docker-file/degov.yml
description: |
  Governance for Igra Network, an EVM-compatible programmability layer on top of Kaspa BlockDAG.
# The following fields in the links are optional and will be used to display basic information about the DAO
links:
  website: https://igralabs.com
  twitter: https://x.com/igra_labs
  discord: https://discord.gg/igralabs
  github: https://github.com/igralabs

# The custom theme configuration for the DAO, this is optional.
theme:
  logoDark: /igra-logo-dark.svg
  logoLight: /igra-logo-dark.svg
  banner: https://raw.githubusercontent.com/ringecosystem/degov-registry/refs/heads/main/assets/banners/demo.jpg
  bannerMobile: https://raw.githubusercontent.com/ringecosystem/degov-registry/refs/heads/main/assets/banners/demo-mobile.jpg
  # The general faqs displayed on the dashboard, at most 5 items
  faqs:
    - question: What is Igra DAO?
      answer: https://igra-labs.gitbook.io/igralabs-docs/igra-dao
    - question: What can the DAO control?
      answer: https://igra-labs.gitbook.io/igralabs-docs/igra-dao
    - question: How do proposals work?
      answer: https://igra-labs.gitbook.io/igralabs-docs/igra-dao
    - question: What is immutable?
      answer: https://igra-labs.gitbook.io/igralabs-docs/igra-dao
    - question: Can the protocol be paused?
      answer: https://igra-labs.gitbook.io/igralabs-docs/igra-dao

# Wallet connection related configuration
wallet:
  walletConnectProjectId: d5dae553538344c06d270be754404e5f

# Chain information: these commented fields are optional if this chain can be accessed by viem.
chain:
  id: 38833
  name: Igra Network
  logo: https://pbs.twimg.com/profile_images/1912415584257474560/GznnScP3_400x400.jpg
  rpcs:
    - https://rpc.igralabs.com:8545
  explorers:
    - https://explorer.igralabs.com
  nativeToken:
    symbol: iKAS
    decimals: 18
    priceId: kaspa
    logo: https://assets.coingecko.com/coins/images/25751/standard/kaspa-icon-exchanges.png?1696524837

# Indexer related configuration
indexer:
  endpoint: https://governance.igralabs.com/graphql
  startBlock: 1260

  ## https://docs.sqd.ai/sdk/reference/processors/evm-batch/general/#set-finality-confirmation
  #finalityConfirmation: 50
  ## https://docs.sqd.ai/sdk/reference/processors/substrate-batch/general/#set-rpc-endpoint
  #capacity: 30
  ## https://docs.sqd.ai/sdk/reference/processors/substrate-batch/general/#set-rpc-endpoint
  #maxBatchCallSize: 200
  ## https://docs.sqd.ai/subsquid-network/reference/networks/#evm--ethereum-compatible
  #gateway:

