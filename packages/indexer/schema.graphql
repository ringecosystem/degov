### ====== custom

type VoteCastGroup @entity @index(fields: ["chainId", "governorAddress", "refProposalId"]) {
  id: ID!
  chainId: Int
  daoCode: String
  governorAddress: String # address
  contractAddress: String # address
  logIndex: Int
  transactionIndex: Int
  proposal: Proposal!
  type: String!
  voter: String! # address
  refProposalId: String! # uint256
  support: Int! # uint8
  weight: BigInt! # uint256
  reason: String! # string
  params: String # bytes
  blockNumber: BigInt!
  blockTimestamp: BigInt!
  transactionHash: String!
}

type Proposal @entity @index(fields: ["chainId", "governorAddress", "proposalId"]) {
  id: ID!
  chainId: Int
  daoCode: String
  governorAddress: String # address
  contractAddress: String # address
  logIndex: Int
  transactionIndex: Int
  proposalId: String! # uint256
  proposer: String! # address
  targets: [String!]! # address[]
  values: [String!]! # uint256[] ## [BigInt!]!
  signatures: [String!]! # string[]
  calldatas: [String!]! # bytes[]
  voteStart: BigInt! # uint256
  voteEnd: BigInt! # uint256
  description: String! # string
  blockNumber: BigInt!
  blockTimestamp: BigInt!
  transactionHash: String!
  voters: [VoteCastGroup!] @derivedFrom(field: "proposal")
  actions: [ProposalAction!] @derivedFrom(field: "proposal")
  stateEpochs: [ProposalStateEpoch!] @derivedFrom(field: "proposal")
  deadlineExtensions: [ProposalDeadlineExtension!] @derivedFrom(field: "proposal")
  timelockOperations: [TimelockOperation!] @derivedFrom(field: "proposal")

  metricsVotesCount: Int
  metricsVotesWithParamsCount: Int
  metricsVotesWithoutParamsCount: Int
  metricsVotesWeightForSum: BigInt
  metricsVotesWeightAgainstSum: BigInt
  metricsVotesWeightAbstainSum: BigInt

  title: String!
  voteStartTimestamp: BigInt!
  voteEndTimestamp: BigInt!
  blockInterval: String
  descriptionHash: String
  proposalSnapshot: BigInt
  proposalDeadline: BigInt
  proposalEta: BigInt
  queueReadyAt: BigInt
  queueExpiresAt: BigInt
  countingMode: String
  timelockAddress: String # address
  timelockGracePeriod: BigInt
  clockMode: String!
  quorum: BigInt!
  decimals: BigInt!
}

